<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حسنات - النسخة الاحترافية</title>
    <meta name="theme-color" content="#2ecc71" />
    <link rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1505506434515-59df1ee15520?q=80&w=1974&auto=format&fit=crop" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1505506434515-59df1ee15520?q=80&w=1974&auto=format&fit=crop" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap');
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Error handling for debugging on mobile
      window.onerror = function(message, source, lineno, colno, error) {
        alert("Error: " + message + "\nSource: " + source + "\nLine: " + lineno + "\nColumn: " + colno);
        return false;
      };
      
      // Catch unhandled promise rejections
      window.onunhandledrejection = function(event) {
        alert("Unhandled Rejection: " + event.reason);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
